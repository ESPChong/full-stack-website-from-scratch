name: Continuous Integration

# 1. Trigger the workflow on pushes or pull requests to main
on:
  pull_request:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - "LICENSE"
  push:
    branches: ["main"]
    paths-ignore:
      - "**.md"
      - "docs/**"

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # -- Security: Secret Scanning --
  secret-scan:
    name: Gitleaks Secret Scan
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: false

  # -- Security: SAST --
  sast:
    name: Semgrep SAST
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v5
      - name: Semgrep Scan
        run: semgrep scan --config=auto --error

  # -- Security: Dependency Audit --
  audit:
    name: npm Audit
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install Dependencies
        run: npm ci
      - name: Audit
        run: npm audit --audit-level=high 

  # -- Type Check --
  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run TypeScript type check
        run: npm --prefix frontend run type-check

  # -- Lint, Build and Test --
  test:
    name: Lint, Build and Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm' # Automatically caches node_modules for speed
          cache-dependency-path: package-lock.json

      # Install dependencies across the monorepo
      - name: Install Dependencies
        run: npm ci

      - name: Lint Frontend
        run: npm --prefix frontend run lint

      - name: Build Frontend
        run: npm --prefix frontend run build

      - name: Run Frontend Tests
        run: npm --prefix frontend test -- --ci

      - name: Lint Backend
        run: npm --prefix backend run lint
      - name: Run Backend Tests
        run: npm --prefix backend test -- --ci --coverage
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/

  # -- Docker Build Verification --
  # Ensures code that breaks containerization is never merged
  docker-build:
    name: Docker Build
    needs: [audit, type-check, test] # Only runs if everything passes
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: frontend/Dockerfile
          push: false # Only build to verify it works; we don't push during CI
          tags: nextjs-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Backend Image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: express-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Image Scanning (Trivy) ──
  image-scan:
    name: Trivy Image Scan
    needs: [docker-build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-buildx-action@v3

      - name: Build backend image for scanning
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: backend:scan
          cache-from: type=gha

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'backend:scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

  # ── Deploy (wired but not triggered — env required) ──
  deploy:
    name: Deploy (manual trigger only)
    if: false
    needs: [image-scan, test]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Placeholder — configure ECR/ECS for production
        run: echo "Set up push to ECR and trigger ECS deployment when env is ready."