events {
    worker_connections 1024;
}

http {
  # ---- Rate Limiting Zones ----
  limit_req_zone $binary_remote_addr zone=api_create:10m rate=2r/s;
  limit_req_zone $binary_remote_addr zone=redirects:10m rate=100r/s;

  # ---- Compression ----
  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;


  upstream frontend_upstream {
    server frontend:3000;
  }

  upstream backend_cluster {
    server backend:5001;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 20m;

    # ---- Cache headers for static assets ----
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
      expires 30d;
      add_header Cache-Control "public, immutable";
    }

    # ---- Error Handling ----
    proxy_intercept_errors on;
    error_page 502 @handle_502; 
    location = @handle_502{
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
    }


    # ---- API → Express ----
    location /api/ {
      proxy_pass http://backend_cluster;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Nginx Health Check ----
    location = /health {
      access_log off;
      return 200 "OK";
      add_header Content-Type text/plain;
    }

    # ---- Known Frontend Paths ----
    location = /dashboard { proxy_pass http://frontend_upstream; proxy_http_version 1.1; proxy_set_header Host $host; }

    # ---- Short Code Redirect → Express ----
    # Matches nanoid-style codes: 4-12 chars, alphanumeric + -_
    # Placed BEFORE the catch-all so short codes reach the backend.
    # Common Next.js prefixes (/_next, /api, /dashboard, etc.) are
    # longer matches and won't collide.
    location ~ "^/[a-zA-Z0-9_-]{4,12}$" {
      rewrite ^/(.*)$ /$1 break;
      proxy_pass http://backend_cluster;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Everything else → Next.js ----
    location / {
      proxy_pass http://frontend_upstream;
      proxy_http_version 1.1;
      proxy_set_header Host              $host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }
}