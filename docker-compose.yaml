services:

  nginx:
    image: nginx:alpine
    
    container_name: local-nginx
    
    ports:
      - "8080:80"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
  frontend:
    build: 
      context: ./frontend  # Points to the frontend folder containing its Dockerfile
    
    container_name: local-frontend
    
    expose:
      - "3000"
    
    restart: unless-stopped
    
    depends_on:
      backend:
        condition: service_healthy
  
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
  backend:
    build: 
      context: ./backend   # Points to the backend folder containing its Dockerfile

    container_name: local-backend
    
    expose:
      - "5001"

    restart: unless-stopped

    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy 
  
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    environment:
      - MONGO_URI=mongodb://mongodb:27017/my_db
      - REDIS_URL=redis://redis:6379
      - PORT=5001

  mongodb:
    image: mongo:8.2

    container_name: local-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo-data:/data/db

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:alpine

    container_name: local-redis
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    command: redis-server --appendonly yes --save 60 1

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
  mongo-data:

networks:
