services:

  nginx:
    image: nginx:alpine
    container_name: local-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    
  frontend:
    build: 
      context: ./frontend  # Points to the frontend folder containing its Dockerfile
    container_name: local-frontend
    expose:
      - "3000"
    restart: unless-stopped
    depends_on:
      - backend
  
  backend:
    build: 
      context: ./backend   # Points to the backend folder containing its Dockerfile
    container_name: local-backend
    expose:
      - "5001"
    restart: unless-stopped
    depends_on:
      - mongodb
      - redis
    environment:
      - MONGO_URI=mongodb://mongodb:27017/your_db_name
      - REDIS_URL=redis://redis:6379
      - PORT=5001

  mongodb:
    image: mongo:latest
    container_name: local-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: local-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo-data: