services:

# -------------------- Nginx --------------------
  nginx:
    image: nginx:alpine
    
    container_name: local-nginx
    
    ports:
      - "8080:80"
    
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy

    networks:
      - frontend_network
      - backend_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:80/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    
  # -------------------- Frontend --------------------
  frontend:
    build: 
      context: . # Points to root (using workspaces)
      dockerfile: frontend/Dockerfile
    
    container_name: local-frontend
    
    networks:
      - frontend_network

    init: true

    restart: unless-stopped
  

# -------------------- Backend --------------------
  backend:
    build: 
      context: .  # Points to root (using workspaces)
      dockerfile: backend/Dockerfile

    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '0.5'

    networks:
      - backend_network

    init: true

    restart: unless-stopped

    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy 
  
    stop_grace_period: 60s

    environment:
      - MONGO_URI=mongodb://mongodb:27017/my_db
      - REDIS_URL=redis://redis:6379
      - PORT=5001

# -------------------- MongoDB --------------------
  mongodb:
    image: mongo:8.2

    container_name: local-mongo

    ports:
      - "27017:27017"

    volumes:
      - mongo_data:/data/db

    networks:
      - backend_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

# -------------------- Redis --------------------
  redis:
    image: redis:alpine

    container_name: local-redis
    
    ports:
      - "6379:6379"
    
    volumes:
      - redis_data:/data
    
    command: redis-server --appendonly yes --save 60 1

    networks:
      -  backend_network

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  redis_data:
  mongo_data:

networks:
  frontend_network:
    driver: bridge

  backend_network:
    driver: bridge
    internal: true